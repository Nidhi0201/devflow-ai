# Optional Render setup (web + Postgres only — NO worker, NO Redis, NO card for worker).
# Note: Render may still ask for a card on some accounts. If so, use DEPLOY.md "Free path" (Koyeb + Neon).

services:
  - type: web
    name: devflow-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: devflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_WEBHOOK_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: devflow-db
    plan: free
    databaseName: devflow
    user: devflow
